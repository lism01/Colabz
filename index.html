<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Colabz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .logo { font-size: 2.6rem; font-weight: 900; background: linear-gradient(90deg, #1DB954, #1ed760); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; letter-spacing: -1px; }
    .tagline { color: #555; margin-bottom: 40px; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; }
    #loginScreen { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 480px; }
    .login-card { background: #141414; border: 1px solid #222; border-radius: 20px; padding: 44px 36px; text-align: center; width: 100%; }
    .login-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
    .login-card p { color: #666; font-size: 0.88rem; line-height: 1.7; margin-bottom: 30px; }
    .spotify-btn { display: inline-flex; align-items: center; gap: 10px; background: #1DB954; color: #000; font-weight: 700; font-size: 0.95rem; border: none; border-radius: 50px; padding: 14px 30px; cursor: pointer; transition: background 0.2s, transform 0.1s; width: 100%; justify-content: center; }
    .spotify-btn:hover { background: #1ed760; transform: scale(1.02); }
    .spotify-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #333; font-size: 0.78rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #222; }
    .manual-label { font-size: 0.75rem; color: #555; text-align: left; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .manual-input { width: 100%; background: #0f0f0f; border: 1px solid #222; border-radius: 8px; color: #fff; padding: 11px 14px; font-size: 0.88rem; outline: none; transition: border 0.2s; margin-bottom: 10px; }
    .manual-input:focus { border-color: #1DB954; }
    .manual-btn { width: 100%; background: #1a1a1a; color: #1DB954; font-weight: 600; font-size: 0.88rem; border: 1px solid #1DB954; border-radius: 50px; padding: 11px; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .manual-btn:hover { background: #1DB95420; }
    .dev-link { margin-top: 20px; font-size: 0.78rem; color: #444; }
    .dev-link a { color: #1DB954; }
    .error-msg { color: #ff5555; font-size: 0.82rem; margin-top: 12px; min-height: 18px; }
    #appScreen { display: none; flex-direction: column; align-items: center; width: 100%; }
    .topbar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 560px; margin-bottom: 32px; }
    .user-pill { display: flex; align-items: center; gap: 8px; background: #141414; border: 1px solid #222; border-radius: 50px; padding: 6px 14px 6px 6px; font-size: 0.82rem; color: #aaa; }
    .user-pill img { width: 26px; height: 26px; border-radius: 50%; background: #222; }
    .logout { background: none; border: none; color: #444; font-size: 0.75rem; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .logout:hover { color: #fff; }
    .card { background: #141414; border: 1px solid #222; border-radius: 16px; padding: 24px; width: 100%; max-width: 560px; margin-bottom: 16px; }
    .card label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 8px; }
    .artist-row { display: flex; align-items: center; gap: 10px; }
    .artist-input { flex: 1; background: #0f0f0f; border: 1px solid #222; border-radius: 8px; color: #fff; padding: 12px 14px; font-size: 0.95rem; outline: none; transition: border 0.2s; }
    .artist-input:focus { border-color: #1DB954; }
    .vs { color: #333; font-weight: 800; font-size: 0.8rem; flex-shrink: 0; }
    .search-btn { width: 100%; max-width: 560px; background: #1DB954; color: #000; font-weight: 800; font-size: 1rem; border: none; border-radius: 50px; padding: 15px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-bottom: 24px; }
    .search-btn:hover { background: #1ed760; transform: scale(1.01); }
    .search-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; transform: none; }
    #status { color: #555; font-size: 0.85rem; margin-bottom: 16px; text-align: center; min-height: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    #status.error { color: #ff5555; }
    .spinner { width: 14px; height: 14px; border: 2px solid #222; border-top-color: #1DB954; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results-header { width: 100%; max-width: 560px; font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: #666; }
    .results-header span { color: #1DB954; }
    .track-list { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 60px; }
    .track { background: #141414; border: 1px solid #1e1e1e; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, background 0.2s; }
    .track:hover { border-color: #1DB954; background: #181818; }
    .track img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #1a1a1a; flex-shrink: 0; }
    .track-info { flex: 1; overflow: hidden; }
    .track-name { font-weight: 600; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artists { color: #666; font-size: 0.78rem; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-album { color: #3a3a3a; font-size: 0.72rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .play-btn { background: #1DB954; color: #000; font-size: 0.72rem; font-weight: 800; text-decoration: none; border-radius: 50px; padding: 6px 14px; flex-shrink: 0; transition: background 0.2s; }
    .play-btn:hover { background: #1ed760; }
    .none-found { text-align: center; color: #444; padding: 50px 0; font-size: 0.92rem; line-height: 2; }
  </style>
</head>
